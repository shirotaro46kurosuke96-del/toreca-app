<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真読み取りテスト</title>
<style>
  body { font-family: sans-serif; padding: 20px; max-width: 480px; margin: 0 auto; background: #f5f5f5; }
  h1 { font-size: 18px; margin-bottom: 16px; }
  input[type=file] { display: block; margin-bottom: 12px; }
  button { padding: 12px 24px; font-size: 15px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  button:disabled { opacity: 0.4; }

  .tx-row {
    display: none;
    margin-top: 16px;
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid #e0e0e0;
    align-items: center;
    gap: 12px;
  }
  .tx-date { font-size: 11px; color: #888; flex-shrink: 0; min-width: 70px; }
  .tx-icon { width: 52px; height: 52px; border-radius: 8px; object-fit: cover; flex-shrink: 0; border: 1px solid #e0e0e0; }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name { font-size: 13px; font-weight: 500; color: #1a1a1a; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .tx-memo { font-size: 11px; color: #888; margin-top: 2px; }
  .tx-amount { font-size: 15px; font-weight: 700; color: #1a1a1a; flex-shrink: 0; }

  #error { margin-top: 16px; padding: 14px; background: #fee; border-radius: 8px; font-size: 14px; color: red; display: none; }
</style>
</head>
<body>
<h1>📷 写真読み取りテスト</h1>
<input type="file" accept="image/*" id="photo" onchange="onPhoto()">
<button id="btn" onclick="run()" disabled>読み取る</button>

<div class="tx-row" id="tx-row">
  <div class="tx-date" id="tx-date">-</div>
  <img class="tx-icon" id="tx-icon" src="" alt="アイコン">
  <div class="tx-info">
    <div class="tx-name" id="tx-name">-</div>
    <div class="tx-memo" id="tx-memo">-</div>
  </div>
  <div class="tx-amount" id="tx-amount">-</div>
</div>

<div id="error"></div>

<script>
const WORKER = 'https://square-block-0903.shirotaro46-kurosuke96.workers.dev';
let b64 = null;
let fullImgEl = null;

function onPhoto() {
  const file = document.getElementById('photo').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      fullImgEl = img;
      const canvas = document.createElement('canvas');
      const max = 800;
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else { w = Math.round(w * max / h); h = max; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      b64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
      document.getElementById('btn').disabled = false;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function cropIcon(img) {
  // メルカリの取引画面：
  // 画面上部にメッセージ欄があるパターン（スクロール済み）→ アイコンはy約42%付近
  // 画面上部から取引情報が見えるパターン → アイコンはy約20%付近
  // 両パターンに対応するため、画像の縦を分析して判定
  // アイコンは常に左端(x:4%)、正方形(幅:19%)
  
  const canvas = document.createElement('canvas');
  const size = 80;
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  
  const sx = img.width * 0.04;
  const sw = img.width * 0.19;
  
  // 画像の縦比率でパターン判定
  // メルカリのスクショはほぼ縦長（高さ/幅 > 1.8）
  // 「取引メッセージを送る」ボタンが上にある場合はy約41%
  // 「取引情報」が上にある場合はy約20%
  // → 安全策として両方試してより鮮明な方を使う（今回は固定値で対応）
  const sy = img.height * 0.41; // メッセージボタンありパターン
  const sh = sw;
  
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, size, size);
  return canvas.toDataURL('image/jpeg', 0.85);
}

async function run() {
  document.getElementById('tx-row').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = '読み取り中...';

  try {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 500,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
            { type: 'text', text: 'この画像はメルカリの取引明細です。以下の情報をJSON形式のみで返してください。他の文字は一切不要です。\n{"date":"購入日時をYYYY-MM-DD形式","name":"カード名","amount":"金額を数字のみ","memo":"プラットフォーム名","icon_y":"商品アイコンの縦位置を画像全体の高さに対する比率で0.0〜1.0で返す"}' }
          ]
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(c => c.type === 'text')?.text;
    if (text) {
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      document.getElementById('tx-date').textContent = parsed.date || '-';
      document.getElementById('tx-name').textContent = parsed.name || '-';
      document.getElementById('tx-memo').textContent = parsed.memo || '-';
      document.getElementById('tx-amount').textContent = parsed.amount ? '¥' + Number(parsed.amount).toLocaleString() : '-';

      // アイコンをトリミング（AIが返したy位置を使う）
      if (fullImgEl) {
        const iconY = parseFloat(parsed.icon_y) || 0.41;
        const canvas = document.createElement('canvas');
        const size = 80;
        canvas.width = size;
        canvas.height = size;
        const ctx = canvas.getContext('2d');
        const sx = fullImgEl.width * 0.04;
        const sy = fullImgEl.height * iconY;
        const sw = fullImgEl.width * 0.19;
        ctx.drawImage(fullImgEl, sx, sy, sw, sw, 0, 0, size, size);
        document.getElementById('tx-icon').src = canvas.toDataURL('image/jpeg', 0.85);
      }

      document.getElementById('tx-row').style.display = 'flex';
    } else {
      document.getElementById('error').textContent = JSON.stringify(data);
      document.getElementById('error').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('error').textContent = e.message;
    document.getElementById('error').style.display = 'block';
  }

  document.getElementById('btn').disabled = false;
  document.getElementById('btn').textContent = '読み取る';
}
</script>
</body>
</html>
