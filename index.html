<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真読み取りテスト</title>
<style>
  body { font-family: sans-serif; padding: 20px; max-width: 480px; margin: 0 auto; }
  h1 { font-size: 18px; margin-bottom: 16px; }
  input[type=file] { display: block; margin-bottom: 12px; }
  button { padding: 12px 24px; font-size: 15px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  button:disabled { opacity: 0.4; }
  #result { margin-top: 16px; padding: 14px; background: #f5f5f5; border-radius: 8px; white-space: pre-wrap; font-size: 14px; display: none; }
  #error { margin-top: 16px; padding: 14px; background: #fee; border-radius: 8px; font-size: 14px; color: red; display: none; }
</style>
</head>
<body>
<h1>📷 写真読み取りテスト</h1>
<input type="file" accept="image/*" id="photo" onchange="onPhoto()">
<button id="btn" onclick="run()" disabled>読み取る</button>
<div id="result"></div>
<div id="error"></div>

<script>
const WORKER = 'https://square-block-0903.shirotaro46-kurosuke96.workers.dev';
let b64 = null;

function onPhoto() {
  const file = document.getElementById('photo').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const max = 800;
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else { w = Math.round(w * max / h); h = max; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      b64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
      document.getElementById('btn').disabled = false;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

async function run() {
  document.getElementById('result').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = '読み取り中...';

  try {
    const res = await fetch(WORKER, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-haiku-4-5',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
            { type: 'text', text: 'この画像に書いてある文字を全て読み取って日本語で出力してください。' }
          ]
        }]
      })
    });
    const data = await res.json();
    const text = data.content?.find(c => c.type === 'text')?.text;
    if (text) {
      document.getElementById('result').textContent = text;
      document.getElementById('result').style.display = 'block';
    } else {
      document.getElementById('error').textContent = JSON.stringify(data);
      document.getElementById('error').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('error').textContent = e.message;
    document.getElementById('error').style.display = 'block';
  }

  document.getElementById('btn').disabled = false;
  document.getElementById('btn').textContent = '読み取る';
}
</script>
</body>
</html>
