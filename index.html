<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>写真読み取りテスト</title>
<style>
  body { font-family: sans-serif; padding: 20px; max-width: 480px; margin: 0 auto; background: #f5f5f5; }
  h1 { font-size: 18px; margin-bottom: 16px; }
  input[type=file] { display: block; margin-bottom: 12px; }
  button { padding: 12px 24px; font-size: 15px; background: #000; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  button:disabled { opacity: 0.4; }

  .tx-row {
    display: none;
    margin-top: 16px;
    background: #fff;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid #e0e0e0;
    align-items: flex-start;
    gap: 10px;
  }
  .tx-date {
    font-size: 11px;
    color: #888;
    flex-shrink: 0;
    min-width: 52px;
    line-height: 1.4;
  }
  .tx-icon {
    width: 52px;
    height: 52px;
    border-radius: 8px;
    object-fit: cover;
    flex-shrink: 0;
    border: 1px solid #e0e0e0;
  }
  .tx-info { flex: 1; min-width: 0; }
  .tx-name {
    font-size: 13px;
    font-weight: 500;
    color: #1a1a1a;
    line-height: 1.4;
    word-break: break-all;
  }
  .tx-memo { font-size: 11px; color: #888; margin-top: 3px; }
  .tx-amount { font-size: 15px; font-weight: 700; color: #1a1a1a; flex-shrink: 0; white-space: nowrap; }

  #error { margin-top: 16px; padding: 14px; background: #fee; border-radius: 8px; font-size: 14px; color: red; display: none; }
  #status { margin-top: 12px; font-size: 13px; color: #888; display: none; }
</style>
</head>
<body>
<h1>📷 写真読み取りテスト</h1>
<input type="file" accept="image/*" id="photo" onchange="onPhoto()">
<button id="btn" onclick="run()" disabled>読み取る</button>
<div id="status"></div>

<div class="tx-row" id="tx-row">
  <div class="tx-date" id="tx-date">-</div>
  <img class="tx-icon" id="tx-icon" src="" alt="アイコン">
  <div class="tx-info">
    <div class="tx-name" id="tx-name">-</div>
    <div class="tx-memo" id="tx-memo">-</div>
  </div>
  <div class="tx-amount" id="tx-amount">-</div>
</div>

<div id="error"></div>

<script>
const WORKER = 'https://square-block-0903.shirotaro46-kurosuke96.workers.dev';
let b64 = null;
let fullImgEl = null;

function onPhoto() {
  const file = document.getElementById('photo').files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      fullImgEl = img;
      const canvas = document.createElement('canvas');
      const max = 800;
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else { w = Math.round(w * max / h); h = max; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      b64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
      document.getElementById('btn').disabled = false;
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function setStatus(msg) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.style.display = msg ? 'block' : 'none';
}

async function callWorker(prompt) {
  const res = await fetch(WORKER, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-haiku-4-5',
      max_tokens: 500,
      messages: [{
        role: 'user',
        content: [
          { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } },
          { type: 'text', text: prompt }
        ]
      }]
    })
  });
  const data = await res.json();
  const text = data.content?.find(c => c.type === 'text')?.text;
  if (!text) throw new Error(JSON.stringify(data));
  return text.replace(/```json|```/g, '').trim();
}

function cropIcon(img, yRatio, heightRatio) {
  const canvas = document.createElement('canvas');
  const size = 80;
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');
  // x位置は常に左端付近（4%）、幅は高さと同じにして正方形
  const sx = img.width * 0.04;
  const sy = img.height * yRatio;
  const sw = img.height * heightRatio; // 正方形になるよう高さ基準
  ctx.drawImage(img, sx, sy, sw, sw, 0, 0, size, size);
  return canvas.toDataURL('image/jpeg', 0.9);
}

async function run() {
  document.getElementById('tx-row').style.display = 'none';
  document.getElementById('error').style.display = 'none';
  document.getElementById('btn').disabled = true;
  document.getElementById('btn').textContent = '読み取り中...';

  try {
    // Step1: アイコン位置を特定
    setStatus('① 商品アイコンの位置を解析中...');
    const posText = await callWorker(
      'この画像はメルカリの取引明細のスクリーンショットです。商品のサムネイル画像（カードの写真）の位置を教えてください。JSONのみ返してください。\n{"icon_y_ratio": 商品サムネイルの上端のy座標÷画像の高さ(0.0〜1.0), "icon_size_ratio": 商品サムネイルの高さ÷画像の高さ(0.0〜1.0)}'
    );
    const pos = JSON.parse(posText);

    // Step2: 取引データを取得
    setStatus('② 取引情報を読み取り中...');
    const dataText = await callWorker(
      'この画像はメルカリの取引明細です。以下の情報をJSON形式のみで返してください。他の文字は一切不要です。\n{"date":"購入日時をYYYY-MM-DD形式","name":"カード名","amount":"金額を数字のみ","memo":"プラットフォーム名"}'
    );
    const parsed = JSON.parse(dataText);

    // 日付を2行表示用に変換（YYYY-MM-DD → YYYY/MM\nDD）
    const dateStr = (parsed.date || '-').replace(/^(\d{4})-(\d{2})-(\d{2})$/, '$1/$2\n$3');
    document.getElementById('tx-date').textContent = dateStr;
    document.getElementById('tx-name').textContent = parsed.name || '-';
    document.getElementById('tx-memo').textContent = parsed.memo || '-';
    document.getElementById('tx-amount').textContent = parsed.amount ? '¥' + Number(parsed.amount).toLocaleString() : '-';

    // アイコンをトリミング
    if (fullImgEl && pos.icon_y_ratio !== undefined) {
      document.getElementById('tx-icon').src = cropIcon(fullImgEl, pos.icon_y_ratio, pos.icon_size_ratio || 0.09);
    }

    document.getElementById('tx-row').style.display = 'flex';
    setStatus('');
  } catch(e) {
    document.getElementById('error').textContent = e.message;
    document.getElementById('error').style.display = 'block';
    setStatus('');
  }

  document.getElementById('btn').disabled = false;
  document.getElementById('btn').textContent = '読み取る';
}
</script>
</body>
</html>
