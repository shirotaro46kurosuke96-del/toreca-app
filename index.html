<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>写真読み取りテスト</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Hiragino Sans', sans-serif;
    background: #F5F5F5;
    color: #1A1A1A;
    max-width: 480px;
    margin: 0 auto;
    padding: 20px;
  }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  p.sub { font-size: 13px; color: #888; margin-bottom: 20px; }

  .worker-box {
    background: #fff;
    border: 1px solid #E0E0E0;
    border-radius: 10px;
    padding: 14px;
    margin-bottom: 16px;
  }
  .worker-box label { font-size: 12px; color: #666; display: block; margin-bottom: 5px; }
  .worker-row { display: flex; gap: 8px; }
  .worker-row input {
    flex: 1;
    padding: 9px 10px;
    border: 1px solid #E0E0E0;
    border-radius: 8px;
    font-size: 13px;
    font-family: monospace;
  }
  .worker-row button {
    padding: 9px 14px;
    background: #1A1A1A;
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .status { font-size: 12px; color: #4CAF50; margin-top: 5px; display: none; }

  .upload-zone {
    border: 2px dashed #CCC;
    border-radius: 10px;
    padding: 32px 20px;
    text-align: center;
    cursor: pointer;
    position: relative;
    background: #fff;
    margin-bottom: 16px;
    transition: border-color .15s;
  }
  .upload-zone:hover { border-color: #999; }
  .upload-zone input {
    position: absolute;
    inset: 0;
    opacity: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
  }
  .upload-zone .icon { font-size: 36px; display: block; margin-bottom: 8px; }
  .upload-zone .text { font-size: 14px; font-weight: 500; }
  .upload-zone .sub { font-size: 12px; color: #999; margin-top: 4px; }

  .preview-wrap { margin-bottom: 16px; display: none; }
  .preview-wrap img {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 10px;
    border: 1px solid #E0E0E0;
  }

  .btn {
    width: 100%;
    padding: 14px;
    background: #1A1A1A;
    color: #fff;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 12px;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .loading {
    display: none;
    text-align: center;
    padding: 20px;
    color: #888;
    font-size: 14px;
  }
  .spinner {
    width: 28px; height: 28px;
    border: 3px solid #E0E0E0;
    border-top-color: #1A1A1A;
    border-radius: 50%;
    animation: spin .8s linear infinite;
    margin: 0 auto 8px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .result-box {
    display: none;
    background: #fff;
    border: 1px solid #E0E0E0;
    border-radius: 10px;
    padding: 16px;
  }
  .result-label {
    font-size: 12px;
    font-weight: 700;
    color: #888;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }
  .result-text {
    font-size: 14px;
    line-height: 1.7;
    color: #1A1A1A;
    white-space: pre-wrap;
  }
  .error-box {
    display: none;
    background: #FEF2F2;
    border: 1px solid #FECACA;
    border-radius: 10px;
    padding: 14px;
    font-size: 13px;
    color: #DC2626;
  }
</style>
</head>
<body>

<h1>📷 写真読み取りテスト</h1>
<p class="sub">写真をアップロードすると、書いてある内容をテキストで表示します。</p>

<div class="worker-box">
  <label>Cloudflare Worker URL</label>
  <div class="worker-row">
    <input type="text" id="worker-url" placeholder="https://xxxx.workers.dev">
    <button onclick="saveUrl()">保存</button>
  </div>
  <div class="status" id="url-status">✅ URLが設定されています</div>
</div>

<div class="upload-zone" id="upload-zone">
  <input type="file" accept="image/*" id="photo-input" onchange="handlePhoto(this)">
  <span class="icon">📷</span>
  <div class="text">タップして写真を選択</div>
  <div class="sub">メルカリのスクショなど</div>
</div>

<div class="preview-wrap" id="preview-wrap">
  <img id="preview-img" alt="プレビュー">
</div>

<button class="btn" id="read-btn" onclick="readPhoto()" disabled>📖 読み取る</button>

<div class="loading" id="loading">
  <div class="spinner"></div>
  読み取り中...
</div>

<div class="result-box" id="result-box">
  <div class="result-label">読み取り結果</div>
  <div class="result-text" id="result-text"></div>
</div>

<div class="error-box" id="error-box"></div>

<script>
let workerUrl = localStorage.getItem('ocr_worker') || '';
let photoB64 = null;
let photoType = 'image/jpeg';

if (workerUrl) {
  document.getElementById('worker-url').value = workerUrl;
  document.getElementById('url-status').style.display = 'block';
}

function saveUrl() {
  workerUrl = document.getElementById('worker-url').value.trim();
  if (workerUrl && !workerUrl.startsWith('http')) workerUrl = 'https://' + workerUrl;
  localStorage.setItem('ocr_worker', workerUrl);
  document.getElementById('url-status').style.display = workerUrl ? 'block' : 'none';
  updateBtn();
}

function updateBtn() {
  document.getElementById('read-btn').disabled = !(workerUrl && photoB64);
}

function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  photoType = file.type || 'image/jpeg';

  const reader = new FileReader();
  reader.onload = e => {
    const dataUrl = e.target.result;
    const img = new Image();
    img.onload = () => {
      // 800px以下に縮小してAPIに送る
      const canvas = document.createElement('canvas');
      const max = 800;
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else { w = Math.round(w * max / h); h = max; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photoB64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
      updateBtn();
    };
    img.src = dataUrl;

    document.getElementById('preview-img').src = dataUrl;
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('result-box').style.display = 'none';
    document.getElementById('error-box').style.display = 'none';
  };
  reader.readAsDataURL(file);
}

async function readPhoto() {
  if (!workerUrl || !photoB64) return;

  document.getElementById('loading').style.display = 'block';
  document.getElementById('result-box').style.display = 'none';
  document.getElementById('error-box').style.display = 'none';
  document.getElementById('read-btn').disabled = true;

  try {
    const res = await fetch(workerUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-3-5-haiku-20241022',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: { type: 'base64', media_type: 'image/jpeg', data: photoB64 }
            },
            {
              type: 'text',
              text: 'この画像に書いてある文字を全て読み取って、そのまま日本語でテキストとして出力してください。'
            }
          ]
        }]
      })
    });

    const data = await res.json();
    const text = (data.content || []).find(c => c.type === 'text')?.text;

    if (text) {
      document.getElementById('result-text').textContent = text;
      document.getElementById('result-box').style.display = 'block';
    } else if (data.error) {
      document.getElementById('error-box').textContent = 'エラー：' + JSON.stringify(data.error);
      document.getElementById('error-box').style.display = 'block';
    } else {
      document.getElementById('error-box').textContent = '読み取り結果が空でした。';
      document.getElementById('error-box').style.display = 'block';
    }
  } catch(e) {
    document.getElementById('error-box').textContent = 'エラー：' + e.message;
    document.getElementById('error-box').style.display = 'block';
  } finally {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('read-btn').disabled = false;
  }
}
</script>
</body>
</html>
